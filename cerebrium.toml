[cerebrium.deployment]
name = "beellama-qwen3-35b"
python_version = "3.11"
docker_base_image_url = "nvidia/cuda:12.4.1-runtime-ubuntu22.04"
include = ["./*", "main.py", "cerebrium.toml"]
exclude = [".*"]

[cerebrium.runtime.custom]
port = 4041
entrypoint = ["python3", "main.py"]
healthcheck_endpoint = "/health"
readycheck_endpoint = "/health"

[cerebrium.hardware]
compute = "ADA_L4"
gpu_count = 1
cpu = 4
memory = 8.0
provider = "aws"
region = "us-east-1"

[cerebrium.scaling]
min_replicas = 0
max_replicas = 1
cooldown = 600
replica_concurrency = 1
response_grace_period = 1800

[cerebrium.dependencies.pip]
kagglehub = "latest"
huggingface_hub = "latest"
requests = "latest"

[cerebrium.dependencies.apt]
curl = "latest"
